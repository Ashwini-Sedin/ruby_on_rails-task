services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev

    container_name: student_management

    ports:
      - "3000:3000"

    volumes:
      - .:/rails
      - bundle_data:/usr/local/bundle

    stdin_open: true
    tty: true

    environment:
      RAILS_ENV: development

volumes:
  bundle_data: